schemaVersion: "2.0.0"

commandTests:
  - name: "JAVA VERSION check"
    command: "bash"
    args:
    - -c
    - |
        java -version  2>&1 | grep "OpenJDK 64-Bit Server VM openjdk"
    expectedOutput: [".*OpenJDK 64-Bit Server VM openjdk-17.*"]
  - name: "TOMCAT VERSION check"
    command: "bash"
    args:
    - -c
    - |
      catalina.sh version 2>/dev/null | grep -F "Server version: "
    expectedOutput: ["Server version: Apache Tomcat/9.*"]